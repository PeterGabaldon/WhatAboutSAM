name: Compile

on:
  push:
jobs:
  windows:
    name: run on windows
    runs-on: windows-2022
    steps:
    - uses: actions/checkout@v6
    - name: Install NASM
      run: | 
        cmd.exe /c my_download_nasm.bat
    - name: Install VSNASM build customizations
      shell: pwsh
      run: |
        $ErrorActionPreference = 'Stop'
        $files = @('nasm.props', 'nasm.targets', 'nasm.xml')
        $versions = @('v170', 'v160', 'v150')

        foreach ($version in $versions) {
          $target = "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\MSBuild\Microsoft\VC\$version\BuildCustomizations"
          New-Item -ItemType Directory -Force -Path $target | Out-Null

          foreach ($file in $files) {
            $destination = Join-Path $target $file
            Invoke-WebRequest -Uri "https://raw.githubusercontent.com/ShiftMediaProject/VSNASM/refs/heads/master/$file" -OutFile $destination

            if ($file -eq 'nasm.targets') {
              $content = Get-Content -Path $destination
              $content |
                Where-Object { $_ -notmatch '^\s*TrackFileAccess\s*=' } |
                Set-Content -Path $destination -Encoding UTF8
            }
          }
        }
    - name: compile
      shell: cmd
      run: | 
        call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\Common7\Tools\VsDevCmd.bat" -arch=x64
        cd WhatAboutSAM
        MSBuild.exe /t:Rebuild /p:Configuration=Release .\WhatAboutSAM.sln
    - name: upload executable
      uses: actions/upload-artifact@v7
      with:
        name: WhatAboutSAM.exe
        path: |
          WhatAboutSAM\x64\Release\WhatAboutSAM.exe
